name: Build Android

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # Compute version from tag or short SHA
      - name: Set version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.0.0-$(git rev-parse --short HEAD)"
          fi
          # Version code: seconds since epoch / 10 (fits in 32-bit int for decades)
          VERSION_CODE=$(( $(date +%s) / 10 ))
          echo "VERSION_NAME=$VERSION" >> "$GITHUB_OUTPUT"
          echo "VERSION_CODE=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION (code: $VERSION_CODE)"

      # Build Lynx JS bundle
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build

      # Copy bundle into Android assets
      - run: cp dist/main.lynx.bundle android/app/src/main/assets/

      # Decode signing keystore (if secrets are configured)
      - name: Decode keystore
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.keystore

      # Build Android APK
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Build release APK
        env:
          KEYSTORE_FILE: ${{ secrets.KEYSTORE_BASE64 != '' && 'release.keystore' || '' }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          VERSION_NAME: ${{ steps.version.outputs.VERSION_NAME }}
          VERSION_CODE: ${{ steps.version.outputs.VERSION_CODE }}
        run: cd android && chmod +x gradlew && ./gradlew assembleRelease

      # Tag the version in git (only on main, not for tag pushes)
      - name: Create git tag
        if: github.ref == 'refs/heads/main'
        env:
          VERSION_NAME: ${{ steps.version.outputs.VERSION_NAME }}
        run: |
          if git rev-parse "build/$VERSION_NAME" >/dev/null 2>&1; then
            echo "Tag build/$VERSION_NAME already exists, skipping"
          else
            git tag "build/$VERSION_NAME"
            git push origin "build/$VERSION_NAME"
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: speedy-bird-${{ steps.version.outputs.VERSION_NAME }}-android
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 90

      # Rename APK with version
      - name: Rename APK
        env:
          VERSION_NAME: ${{ steps.version.outputs.VERSION_NAME }}
        run: |
          APK=$(ls android/app/build/outputs/apk/release/*.apk | head -1)
          cp "$APK" "android/app/build/outputs/apk/release/speedy-bird-${VERSION_NAME}.apk"

      # Create GitHub Release with APK attached
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION_NAME: ${{ steps.version.outputs.VERSION_NAME }}
          VERSION_CODE: ${{ steps.version.outputs.VERSION_CODE }}
        run: |
          COMMIT_SHA="${{ github.sha }}"
          SHORT_SHA="${COMMIT_SHA:0:7}"
          APK_FILE="speedy-bird-${VERSION_NAME}.apk"
          APK_SIZE=$(du -h "android/app/build/outputs/apk/release/$APK_FILE" | cut -f1)

          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            TITLE="Speedy Bird $TAG"
            PRERELEASE=""
          else
            TAG="build/$VERSION_NAME"
            TITLE="Speedy Bird v${VERSION_NAME}"
            PRERELEASE=""
          fi

          BODY="Automated release built from commit [\`${COMMIT_SHA}\`](https://github.com/${{ github.repository }}/commit/${COMMIT_SHA}).

          ### Downloads

          | Platform | File | Size | Notes |
          |----------|------|------|-------|
          | Android | \`${APK_FILE}\` | ${APK_SIZE} | Signed release APK — install directly on device |

          ### Build Info

          | Field | Value |
          |-------|-------|
          | Version | \`${VERSION_NAME}\` |
          | Version Code | \`${VERSION_CODE}\` |
          | Commit | [\`${SHORT_SHA}\`](https://github.com/${{ github.repository }}/commit/${COMMIT_SHA}) |
          | Lynx SDK | 3.7.0 |
          | Min Android | API 21 (5.0 Lollipop) |

          > **[Play the web version](https://jonathanperis.github.io/speedy-bird-lynx/)** if you don't have an Android device."

          gh release create "$TAG" \
            --title "$TITLE" \
            --notes "$BODY" \
            $PRERELEASE \
            "android/app/build/outputs/apk/release/$APK_FILE"
