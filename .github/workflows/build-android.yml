name: Build Android

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # Compute version from tag or short SHA
      - name: Set version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.0.0-$(git rev-parse --short HEAD)"
          fi
          # Version code: seconds since epoch / 10 (fits in 32-bit int for decades)
          VERSION_CODE=$(( $(date +%s) / 10 ))
          echo "VERSION_NAME=$VERSION" >> "$GITHUB_OUTPUT"
          echo "VERSION_CODE=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION (code: $VERSION_CODE)"

      # Build Lynx JS bundle
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build

      # Copy bundle into Android assets
      - run: cp dist/main.lynx.bundle android/app/src/main/assets/

      # Decode signing keystore (if secrets are configured)
      - name: Decode keystore
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.keystore

      # Build Android APK
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Build release APK
        env:
          KEYSTORE_FILE: ${{ secrets.KEYSTORE_BASE64 != '' && 'release.keystore' || '' }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          VERSION_NAME: ${{ steps.version.outputs.VERSION_NAME }}
          VERSION_CODE: ${{ steps.version.outputs.VERSION_CODE }}
        run: cd android && chmod +x gradlew && ./gradlew assembleRelease

      # Tag the version in git (only on main, not for tag pushes)
      - name: Create git tag
        if: github.ref == 'refs/heads/main'
        env:
          VERSION_NAME: ${{ steps.version.outputs.VERSION_NAME }}
        run: |
          git tag "build/$VERSION_NAME"
          git push origin "build/$VERSION_NAME"

      - uses: actions/upload-artifact@v5
        with:
          name: speedy-bird-${{ steps.version.outputs.VERSION_NAME }}-android
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 90
