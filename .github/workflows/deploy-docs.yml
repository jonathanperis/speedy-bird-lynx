name: Deploy Docs

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
  gollum:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Clone wiki
        run: git clone https://github.com/${{ github.repository }}.wiki.git wiki/ || echo "Wiki not found, skipping"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install marked
        run: npm install marked --no-save

      - name: Generate docs
        env:
          DOCS_TITLE: "Speedy Bird Lynx"
          DOCS_DESCRIPTION: "Flappy Bird clone built with ReactLynx and TypeScript — runs natively on iOS, Android, and Web"
          GITHUB_URL: "https://github.com/jonathanperis/speedy-bird-lynx"
          OUTPUT_PATH: "docs/docs/index.html"
          TEMPLATE_PATH: ".github/docs-template.html"
        run: node --input-type=commonjs < .github/generate-docs.js

      - name: Commit and push docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/docs/index.html
          git diff --staged --quiet || (git commit -m "chore: regenerate docs from wiki [skip ci]" && git push)
