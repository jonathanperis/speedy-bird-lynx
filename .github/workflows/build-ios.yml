name: Build iOS

# ┌──────────────────────────────────────────────────────────────────────┐
# │ REQUIRES: Apple Developer Program ($99/year)                        │
# │                                                                     │
# │ To enable this workflow you need to:                                │
# │                                                                     │
# │ 1. Create an Xcode project (.xcodeproj) via Xcode:                 │
# │    - Open Xcode > Create New Project > App                         │
# │    - Product Name: SpeedyBird                                      │
# │    - Bundle ID: com.jonathanperis.speedybird                       │
# │    - Language: Swift                                                │
# │    - Add existing Swift files from ios/SpeedyBird/                 │
# │    - Set Bridging Header in Build Settings                         │
# │    - Add main.lynx.bundle to Copy Bundle Resources                 │
# │    - Set User Script Sandboxing = NO in Build Settings             │
# │                                                                     │
# │ 2. Enroll in the Apple Developer Program:                          │
# │    https://developer.apple.com/programs/                           │
# │                                                                     │
# │ 3. Create a signing certificate + provisioning profile             │
# │    (Fastlane Match recommended for CI)                             │
# │                                                                     │
# │ 4. Add these GitHub secrets:                                       │
# │    - APPLE_CERTIFICATE_BASE64                                      │
# │    - APPLE_CERTIFICATE_PASSWORD                                    │
# │    - APPLE_PROVISIONING_PROFILE_BASE64                             │
# │    - APPLE_TEAM_ID                                                 │
# │                                                                     │
# │ Without these, the workflow builds unsigned (no device install).    │
# └──────────────────────────────────────────────────────────────────────┘

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - name: Check for Xcode project
        id: check
        run: |
          if ls ios/*.xcodeproj 1>/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Skipping iOS build — no Xcode project found. See workflow header for setup instructions."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      # Build Lynx JS bundle
      - uses: actions/setup-node@v5
        if: steps.check.outputs.exists == 'true'
        with:
          node-version: 20
          cache: npm
      - run: npm ci
        if: steps.check.outputs.exists == 'true'
      - run: npm run build
        if: steps.check.outputs.exists == 'true'

      # Copy bundle into iOS app resources
      - run: cp dist/main.lynx.bundle ios/SpeedyBird/Resources/
        if: steps.check.outputs.exists == 'true'

      # Install CocoaPods dependencies
      - run: cd ios && pod install
        if: steps.check.outputs.exists == 'true'

      # Build unsigned archive (signing requires Apple Developer Program)
      - name: Build iOS archive
        if: steps.check.outputs.exists == 'true'
        run: |
          xcodebuild archive \
            -workspace ios/SpeedyBird.xcworkspace \
            -scheme SpeedyBird \
            -configuration Release \
            -sdk iphoneos \
            -archivePath ${{ runner.temp }}/SpeedyBird.xcarchive \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - uses: actions/upload-artifact@v5
        if: steps.check.outputs.exists == 'true'
        with:
          name: ios-archive
          path: ${{ runner.temp }}/SpeedyBird.xcarchive
          retention-days: 90
