name: Build Check

on:
  workflow_dispatch:
  push:
    branches: [main, lynx-migration]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bunx tsc --noEmit

      - name: Build
        run: bun run build

      - uses: actions/upload-artifact@v7
        with:
          name: lynx-bundles
          path: |
            dist/main.lynx.bundle
            dist/main.web.bundle
          retention-days: 14
