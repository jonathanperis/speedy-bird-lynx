name: Build Check

on:
  workflow_dispatch:
  push:
    branches: [main, lynx-migration]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build

      - uses: actions/upload-artifact@v5
        with:
          name: lynx-bundles
          path: |
            dist/main.lynx.bundle
            dist/main.web.bundle
          retention-days: 14