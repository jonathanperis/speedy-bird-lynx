name: CI

on:
  push:
    branches: [master, lynx-migration]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: lynx-bundles
          path: |
            dist/main.lynx.bundle
            dist/main.web.bundle
          retention-days: 14
